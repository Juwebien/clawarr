apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # qBittorrent — deployment file is selected by installer:
  # VPN enabled:  deployment-vpn.yaml (default, includes Gluetun sidecar)
  # VPN disabled: deployment-novpn.yaml (bare qBittorrent)
  # The installer patches this kustomization to select the right variant.
  - qbittorrent/configmap.yaml
  - qbittorrent/deployment-vpn.yaml
  - qbittorrent/service.yaml
  # Arr stack
  - sonarr/deployment.yaml
  - sonarr/service.yaml
  - radarr/deployment.yaml
  - radarr/service.yaml
  - prowlarr/deployment.yaml
  - prowlarr/service.yaml
  # Media server
  - jellyfin/deployment.yaml
  - jellyfin/service.yaml
