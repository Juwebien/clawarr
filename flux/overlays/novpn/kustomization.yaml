apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay: uses the same bases but replaces qBittorrent VPN deployment
# with a no-VPN version via strategic merge patch

resources:
  - ../../base
  - ../../media
  - ../../agent
  - ../../config

patchesStrategicMerge:
  - qbittorrent-novpn-patch.yaml
