apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: clawarr
spec:
  template:
    spec:
      containers:
        # Remove gluetun sidecar
        - $patch: delete
          name: gluetun
        # Replace qbittorrent container entirely to remove vpn-init volumeMount and add ports
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest
          ports:
            - containerPort: 8080
              name: webui
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "${TIMEZONE}"
            - name: WEBUI_PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - $patch: delete
              name: vpn-init
          resources:
            requests:
              memory: "128Mi"
              cpu: "25m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - $patch: delete
          name: gluetun-data
        - $patch: delete
          name: vpn-init
        - $patch: delete
          name: vpn-config
