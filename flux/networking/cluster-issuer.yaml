apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-clawarr
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${LETSENCRYPT_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-clawarr-key
    solvers:
      - http01:
          ingress:
            class: envoy
