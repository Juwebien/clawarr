---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: clawarr
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: clawarr-gateway
  namespace: clawarr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-clawarr
spec:
  gatewayClassName: clawarr
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: clawarr-tls
