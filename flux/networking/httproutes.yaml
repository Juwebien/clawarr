---
# HTTPRoutes for domain mode — only deployed when DOMAIN is set
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  namespace: clawarr
spec:
  parentRefs:
    - name: clawarr-gateway
      namespace: clawarr
  hostnames:
    - "jellyfin.${DOMAIN}"
  rules:
    - backendRefs:
        - name: jellyfin
          port: 8096
---
apiVersion: gateway.networking.k8s.io/v1
