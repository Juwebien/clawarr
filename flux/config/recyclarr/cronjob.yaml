apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: clawarr
spec:
  schedule: "0 4 * * *"  # Daily at 4 AM
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              command: ["recyclarr", "sync"]
              env:
                - name: TZ
                  value: "${TIMEZONE}"
                - name: RECYCLARR_APP_DATA
                  value: "/config"
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: clawarr-arr-keys
                      key: RADARR_API_KEY
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: clawarr-arr-keys
                      key: SONARR_API_KEY
              volumeMounts:
                - name: config-file
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                - name: cache
                  mountPath: /config/cache
                - name: logs
                  mountPath: /config/logs
          volumes:
            - name: config-file
              configMap:
                name: recyclarr-config
            - name: cache
              emptyDir: {}
            - name: logs
              emptyDir: {}
