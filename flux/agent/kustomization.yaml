apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - configmap-webhook.yaml

configMapGenerator:
  - name: clawarr-openclaw-config
    namespace: clawarr
    files:
      - openclaw.json=configmap-openclaw.json
  - name: clawarr-workspace
    namespace: clawarr
    files:
      - SOUL.md=workspace/SOUL.md
      - TOOLS.md=workspace/TOOLS.md
  - name: clawarr-skill-media
    namespace: clawarr
    files:
      - SKILL.md=workspace/skills/media-stack/SKILL.md

generatorOptions:
  disableNameSuffixHash: true
